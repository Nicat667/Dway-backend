name: CI

on:
  pull_request:
    branches: [ development ]
    types: [ opened, synchronize, reopened ]

jobs:

  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew clean test jacocoTestReport --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      - name: SonarCloud analysis
        run: ./gradlew sonar --no-daemon
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  merge-pr-to-development:
    name: Merge PR → development
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Merge pull request
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  merge-to-master:
    name: Merge development → master
    needs: merge-pr-to-development
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge development into master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git fetch origin development
          git checkout master
          COMMITS=$(git rev-list origin/master..origin/development --count)
          if [ "$COMMITS" -gt "0" ]; then
            git merge origin/development --no-ff -m "chore: auto-merge development into master [ci]"
            git push origin master
          else
            echo "No new commits ahead of master — skipping merge."
          fi