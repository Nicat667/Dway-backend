version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: dway-postgres
    restart: always
    environment:
      POSTGRES_DB: dway_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dway-redis
    restart: always
    ports:
      - "6380:6379"

volumes:
  postgres_data: