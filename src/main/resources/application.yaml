spring:
  application:
    name: dway-backend

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true

  data:
    redis:
      timeout: 2000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900
    refresh-token-expiry: 2592000
  email:
    verification-expiry-minutes: 15

aws:
  access-key: ${AWS_ACCESS_KEY:dummy}
  secret-key: ${AWS_SECRET_KEY:dummy}
  s3:
    bucket: ${AWS_S3_BUCKET:dway-assets}
    region: ${AWS_S3_REGION:us-east-1}

ai:
  api-key: ${AI_API_KEY:dummy}
  base-url: https://api.anthropic.com/v1

management:
  endpoints:
    web:
      exposure:
        include: health  # only expose health endpoint publicly
  endpoint:
    health:
      show-details: always  # show DB and Redis status in health response

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
