databaseChangeLog:
  - changeSet:
      id: 012-create-comments
      author: Nijat
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: post_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_comments_post_id
                    references: posts(id)

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_comments_user_id
                    references: users(id)

              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - createIndex:
            tableName: comments
            indexName: idx_comments_post_id
            columns:
              - column:
                  name: post_id

        - createIndex:
            tableName: comments
            indexName: idx_comments_user_id
            columns:
              - column:
                  name: user_id