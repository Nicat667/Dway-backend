name: CI

on:
  push:
    branches-ignore: [ master ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew clean test jacocoTestReport --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      - name: SonarCloud analysis
        run: ./gradlew sonar --no-daemon
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR and auto-merge to master
        run: |
          gh pr create \
            --base master \
            --head ${{ github.ref_name }} \
            --title "chore: auto-merge ${{ github.ref_name }}" \
            --body "Automated PR created by CI after passing all checks." \
            || true
          gh pr merge ${{ github.ref_name }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}